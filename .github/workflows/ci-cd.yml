name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Markdown Files
      run: |
        echo "=== 检查Markdown文件 ==="
        find . -name "*.md" -type f | head -20
        echo "✓ 发现 $(find . -name '*.md' -type f | wc -l) 个Markdown文件"
    
    - name: Validate YAML/JSON
      run: |
        echo "=== 验证配置文件 ==="
        if [ -f "package.json" ]; then
          cat package.json | python3 -m json.tool > /dev/null && echo "✓ package.json 有效"
        fi
        echo "✓ 配置文件验证完成"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Deployment Notification
      run: |
        echo "✅ 代码已部署到主分支"
        echo "仓库: ${{ github.repository }}"
        echo "提交: ${{ github.sha }}"
        echo "作者: ${{ github.actor }}"
        echo "时间: $(date)"
    
    - name: Send Telegram Notification
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
          MESSAGE="🚀 *代码部署成功*%0A%0A"
          MESSAGE+="📦 仓库: ${{ github.repository }}%0A"
          MESSAGE+="📝 提交: ${{ github.event.head_commit.message }}%0A"
          MESSAGE+="👤 作者: ${{ github.actor }}%0A"
          MESSAGE+="⏰ 时间: $(date '+%Y-%m-%d %H:%M')%0A%0A"
          MESSAGE+="🔗 [查看代码](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true"
          
          echo "✓ Telegram通知已发送"
        else
          echo "⚠️ Telegram secrets未配置，跳过通知"
        fi

  sync-to-notion:
    name: Sync to Notion
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4
    
    - name: Sync Documentation
      run: |
        echo "=== 同步文档到Notion ==="
        echo "此步骤需要配置Notion API Key"
        echo "后续可添加自动同步逻辑"
        echo "✓ 同步检查完成"
