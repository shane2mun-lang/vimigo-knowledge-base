name: Daily Report Generator

on:
  schedule:
    # 每天上午9点运行 (UTC时间1点)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  generate-report:
    name: Generate Daily Report
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Create Daily Report Template
      run: |
        REPORT_FILE="reports/daily/$(date +'%Y-%m-%d').md"
        mkdir -p reports/daily
        
        cat > $REPORT_FILE << EOF
        # 日报 - $(date +'%Y-%m-%d')

        ## 📊 招聘进展
        - 新申请: 
        - 待面试: 
        - 已Offer: 
        - 已入职: 

        ## 🎯 今日完成
        - [ ] 
        - [ ] 
        - [ ] 

        ## 📅 明日计划
        - [ ] 
        - [ ] 

        ## 💡 备注
        

        ---
        *自动生成于 $(date)*
        EOF
        
        echo "✓ 日报模板已创建: $REPORT_FILE"
    
    - name: Commit Report
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reports/
        git diff --quiet && git diff --staged --quiet || git commit -m "Add daily report for $(date +'%Y-%m-%d')"
        git push
